name: ai_timer_app
description: "An AI-powered premium focus timer app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  fl_chart: ^0.66.2
  percent_indicator: ^4.2.3
  shared_preferences: ^2.3.1
  google_generative_ai: ^0.4.6
  flutter_tts: ^4.0.2
  flutter_dotenv: ^5.1.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo/mindtick_logo.png"
  adaptive_icon_background: "#06141B"

flutter:
  uses-material-design: true
  assets:
    - .env
